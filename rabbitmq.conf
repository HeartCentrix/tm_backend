# RabbitMQ Configuration — TMvault production tuning for 250 TiB / 5K users
# =============================================================================

# Disable deprecated management_metrics_collection feature
deprecated_features.permit.management_metrics_collection = false

# -----------------------------------------------------------------------------
# Long-running consumer ack timeout
# -----------------------------------------------------------------------------
# Default is 30 min. PST/restore jobs on whale mailboxes (>50GB)
# regularly exceed this. Without this override, RabbitMQ redelivers the
# message and a second worker picks it up while the first is still
# processing. PST workers resume from checkpoint so it's not catastrophic,
# but it wastes pool capacity. 4 hours covers the 99th-percentile job.
consumer_timeout = 14400000

# -----------------------------------------------------------------------------
# Resource limits
# -----------------------------------------------------------------------------
# Memory high watermark. Above this, publishers get blocked. Default is
# 0.4 of system RAM. Bump to 0.6 on dedicated broker hosts so traffic
# spikes don't block publishes.
vm_memory_high_watermark.relative = 0.6

# Disk free space alarm. Below this threshold, publishers are blocked.
disk_free_limit.absolute = 5GB

# Heartbeat (negotiated with clients; 60s is a sane default).
heartbeat = 60

# Channel limit per connection — large worker pools need many.
channel_max = 2048

# Frame size — bump for large spec dicts on whale-job messages.
frame_max = 262144
