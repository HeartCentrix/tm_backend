[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
markers =
    integration: marks tests that require docker services (deselect with '-m "not integration"')
    slow: marks load / performance tests
    worm: WORM / Object Lock parity tests
    chaos: fault-injection / chaos drills
filterwarnings =
    ignore::DeprecationWarning
