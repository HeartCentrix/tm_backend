services:
  postgres:
    image: postgres:16-alpine
    container_name: tm_vault_db
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - tm-network

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: tm_vault_gateway
    env_file: .env
    environment:
      DB_HOST: postgres
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    ports:
      - "8080:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: tm_vault_auth
    env_file: .env
    environment:
      DB_HOST: postgres
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  tenant-service:
    build:
      context: .
      dockerfile: services/tenant-service/Dockerfile
    container_name: tm_vault_tenant
    env_file: .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  resource-service:
    build:
      context: .
      dockerfile: services/resource-service/Dockerfile
    container_name: tm_vault_resource
    env_file: .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  job-service:
    build:
      context: .
      dockerfile: services/job-service/Dockerfile
    container_name: tm_vault_job
    env_file: .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  snapshot-service:
    build:
      context: .
      dockerfile: services/snapshot-service/Dockerfile
    container_name: tm_vault_snapshot
    env_file: .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  dashboard-service:
    build:
      context: .
      dockerfile: services/dashboard-service/Dockerfile
    container_name: tm_vault_dashboard
    env_file: .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  alert-service:
    build:
      context: .
      dockerfile: services/alert-service/Dockerfile
    container_name: tm_vault_alert
    env_file: .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

volumes:
  postgres_data:

networks:
  tm-network:
    driver: bridge
