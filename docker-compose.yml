services:
  postgres:
    image: postgres:16-alpine
    container_name: tm_vault_db
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    command: postgres -c max_connections=300 -c shared_buffers=256MB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - tm-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: tm_vault_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    # Config mounted from host - if mount fails, comment out and use defaults:
    # volumes:
    #   - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tm-network

  redis:
    image: redis:7-alpine
    container_name: tm_vault_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - tm-network

  # Azurite — local Azure Storage emulator used for unit-integration tests.
  # Started only under the `test` profile: `docker-compose --profile test up -d azurite`.
  # Prod tests run against real Azure via AZURE_TEST_CONNECTION_STRING env var.
  # One op (stage_block_from_url) is not implemented by Azurite 3.29.0 — the
  # corresponding test is skipped when the connection string points to Azurite.
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.29.0
    container_name: tm_vault_azurite
    command: "azurite-blob --blobHost 0.0.0.0 --loose --skipApiVersionCheck"
    ports:
      - "10000:10000"
    volumes:
      - azurite_data:/data
    profiles:
      - test
    restart: unless-stopped

  # SeaweedFS — local S3-compatible object store used for on-prem backend
  # contract tests. Started only under the `test` profile.
  # Object Lock + versioning enabled at bucket creation — see
  # tests/fixtures/seaweedfs-s3.json and the _ensure_test_bucket fixture.
  seaweedfs:
    image: chrislusf/seaweedfs:3.71
    container_name: tm_vault_seaweedfs
    command:
      - "server"
      - "-dir=/data"
      - "-ip=0.0.0.0"
      - "-s3"
      - "-s3.config=/config/s3.json"
      - "-filer"
      # Volume size + preallocation sized for dev hosts with tight disk.
      # 1024 MB + default preallocation refuses all writes on a machine
      # with <1 GB free (preflight probe fails with "no free volumes").
      # Smaller volumes + no preallocation makes writes work on any host;
      # throughput impact is negligible for per-backup object patterns.
      - "-master.volumeSizeLimitMB=256"
      - "-volume.max=0"
      - "-volume.preStopSeconds=1"
      - "-master.volumePreallocate=false"
    volumes:
      - ./tests/fixtures/seaweedfs-s3.json:/config/s3.json:ro
      - seaweedfs_data:/data
    ports:
      - "8333:8333"
      - "9333:9333"
    profiles:
      - test
    restart: unless-stopped
    networks:
      - tm-network

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: tm_vault_gateway
    env_file: .env
    environment:
      DB_HOST: postgres
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    ports:
      - "8080:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: tm_vault_auth
    env_file: .env
    environment:
      DB_HOST: postgres
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  tenant-service:
    build:
      context: .
      dockerfile: services/tenant-service/Dockerfile
    container_name: tm_vault_tenant
    env_file: .env
    environment:
      DB_HOST: postgres
      # Manual discovery triggered from Protection/Tenant pages runs
      # here too — needs cert access for the SharePoint admin API.
      # Cert shipped via SHAREPOINT_CERT_PEM_B64 env var (graph_client
      # reads that first, then falls back to disk). Avoids Docker Desktop
      # WSL "mkdir /run/desktop/mnt/host/d: file exists" glitch that
      # used to block this container from starting.
      SHAREPOINT_CERT_PEM_B64: ${SHAREPOINT_CERT_PEM_B64:-}
      SHAREPOINT_CERT_THUMBPRINT: ${SHAREPOINT_CERT_THUMBPRINT:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  resource-service:
    build:
      context: .
      dockerfile: services/resource-service/Dockerfile
    container_name: tm_vault_resource
    env_file: .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  job-service:
    build:
      context: .
      dockerfile: services/job-service/Dockerfile
    container_name: tm_vault_job
    env_file: .env
    environment:
      DB_HOST: postgres
      RABBITMQ_ENABLED: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  snapshot-service:
    build:
      context: .
      dockerfile: services/snapshot-service/Dockerfile
    container_name: tm_vault_snapshot
    env_file: .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  dashboard-service:
    build:
      context: .
      dockerfile: services/dashboard-service/Dockerfile
    container_name: tm_vault_dashboard
    env_file: .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  alert-service:
    build:
      context: .
      dockerfile: services/alert-service/Dockerfile
    container_name: tm_vault_alert
    env_file: .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  discovery-worker:
    build:
      context: .
      dockerfile: workers/discovery-worker/Dockerfile
    container_name: tm_vault_discovery
    env_file: .env
    environment:
      DB_HOST: postgres
      RABBITMQ_ENABLED: ${RABBITMQ_ENABLED:-false}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      # SharePoint admin API requires a cert-signed JWT. Same setup as
      # backup-worker — see secrets/sharepoint_auth.pem.
      # Cert shipped via SHAREPOINT_CERT_PEM_B64 env var (graph_client
      # reads that first, then falls back to disk). Avoids Docker Desktop
      # WSL "mkdir /run/desktop/mnt/host/d: file exists" glitch that
      # used to block this container from starting.
      SHAREPOINT_CERT_PEM_B64: ${SHAREPOINT_CERT_PEM_B64:-}
      SHAREPOINT_CERT_THUMBPRINT: ${SHAREPOINT_CERT_THUMBPRINT:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  # ===== Mass Backup Services =====
  
  backup-scheduler:
    build:
      context: .
      dockerfile: services/backup-scheduler/Dockerfile
    container_name: tm_vault_backup_scheduler
    env_file: .env
    environment:
      DB_HOST: postgres
      RABBITMQ_ENABLED: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8008:8008"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  report-service:
    build:
      context: .
      dockerfile: services/report-service/Dockerfile
    container_name: tm_vault_report_service
    env_file: .env
    environment:
      DB_HOST: postgres
    ports:
      - "8014:8014"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  backup-worker:
    build:
      context: .
      dockerfile: workers/backup-worker/Dockerfile
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      RABBITMQ_ENABLED: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY}
      # Multi-app registration
      APP_1_CLIENT_ID: ${APP_1_CLIENT_ID}
      APP_1_CLIENT_SECRET: ${APP_1_CLIENT_SECRET}
      APP_1_TENANT_ID: ${APP_1_TENANT_ID}
      APP_2_CLIENT_ID: ${APP_2_CLIENT_ID:-}
      APP_2_CLIENT_SECRET: ${APP_2_CLIENT_SECRET:-}
      APP_2_TENANT_ID: ${APP_2_TENANT_ID:-}
      APP_3_CLIENT_ID: ${APP_3_CLIENT_ID:-}
      APP_3_CLIENT_SECRET: ${APP_3_CLIENT_SECRET:-}
      APP_3_TENANT_ID: ${APP_3_TENANT_ID:-}
      AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID}
      AZURE_AD_CLIENT_SECRET: ${AZURE_AD_CLIENT_SECRET}
      # Cert-based auth for SharePoint REST. Optional — falls back to
      # the client-secret path when unset (Graph works, SP REST 401s
      # with "Unsupported app only token"). See
      # scripts/generate_sharepoint_cert.py + secrets/.
      # Cert shipped via SHAREPOINT_CERT_PEM_B64 env var (graph_client
      # reads that first, then falls back to disk). The bind-mount was
      # dropped because Docker Desktop on Windows intermittently errors
      # with "mkdir /run/desktop/mnt/host/d: file exists" when the WSL
      # distro reloads, blocking every worker container from starting.
      SHAREPOINT_CERT_PEM_B64: ${SHAREPOINT_CERT_PEM_B64:-}
      SHAREPOINT_CERT_THUMBPRINT: ${SHAREPOINT_CERT_THUMBPRINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network
    deploy:
      # Default to a single replica. The worker's internal asyncio.Semaphore
      # (BACKUP_CONCURRENCY, default 100) already fans out dozens of items
      # concurrently per process, and multi-app Graph rotation spreads load
      # across the configured apps regardless of replica count. Multiple
      # replicas multiply DB connections, token caches, and RabbitMQ channels
      # without proportional throughput gain. Override via BACKUP_WORKER_REPLICAS
      # env var if a specific workload genuinely needs more parallelism.
      replicas: ${BACKUP_WORKER_REPLICAS:-1}

  # Heavy-pool backup worker for oversized OneDrive drives (>100 GB default
  # via BACKUP_HEAVY_THRESHOLD_BYTES). Consumes backup.heavy so regular
  # backup-worker replicas aren't blocked for hours by a single monster drive.
  # Gated by the 'heavy' compose profile — prod brings it up with
  # `docker-compose --profile heavy up -d`; local dev leaves it idle.
  backup-worker-heavy:
    build:
      context: .
      dockerfile: workers/backup-worker/Dockerfile
    container_name: tm_vault_backup_worker_heavy
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      RABBITMQ_ENABLED: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY}
      APP_1_CLIENT_ID: ${APP_1_CLIENT_ID}
      APP_1_CLIENT_SECRET: ${APP_1_CLIENT_SECRET}
      APP_1_TENANT_ID: ${APP_1_TENANT_ID}
      APP_2_CLIENT_ID: ${APP_2_CLIENT_ID:-}
      APP_2_CLIENT_SECRET: ${APP_2_CLIENT_SECRET:-}
      APP_2_TENANT_ID: ${APP_2_TENANT_ID:-}
      APP_3_CLIENT_ID: ${APP_3_CLIENT_ID:-}
      APP_3_CLIENT_SECRET: ${APP_3_CLIENT_SECRET:-}
      APP_3_TENANT_ID: ${APP_3_TENANT_ID:-}
      AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID}
      AZURE_AD_CLIENT_SECRET: ${AZURE_AD_CLIENT_SECRET}
      # Cert via env var — drops the /app/secrets bind-mount that was
      # hitting Docker Desktop's WSL mkdir glitch.
      SHAREPOINT_CERT_PEM_B64: ${SHAREPOINT_CERT_PEM_B64:-}
      SHAREPOINT_CERT_THUMBPRINT: ${SHAREPOINT_CERT_THUMBPRINT:-}
      # Heavy-pool knobs.
      BACKUP_WORKER_QUEUE: backup.heavy
      MAX_CONCURRENT_ONEDRIVE_BACKUPS_PER_WORKER: "1"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 16G
        reservations:
          memory: 4G
    mem_limit: 16g
    restart: unless-stopped
    networks:
      - tm-network

  chat-export-worker:
    build:
      context: .
      dockerfile: workers/chat-export-worker/Dockerfile
    container_name: tm_vault_chat_export_worker
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      RABBITMQ_ENABLED: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network
    ports:
      - "9102:9102"
      - "8081:8081"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G

  # graph-proxy, delta-token, search-service: retired as of the services audit.
  # - graph-proxy: zero callers; GraphClient talks to Microsoft Graph directly
  # - delta-token: zero callers; delta tokens live on snapshots.delta_token column
  # - search-service: gateway routes /resources/search to resource-service (not this)
  # Source trees remain under services/ for reference. Re-add to compose only if
  # a caller appears. This saves ~240 MB RAM and several seconds on compose boot.

  progress-tracker:
    build:
      context: .
      dockerfile: services/progress-tracker/Dockerfile
    container_name: tm_vault_progress_tracker
    env_file: .env
    environment:
      DB_HOST: postgres
      RABBITMQ_ENABLED: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "8011:8011"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  audit-service:
    build:
      context: .
      dockerfile: services/audit-service/Dockerfile
    container_name: tm_vault_audit
    env_file: .env
    environment:
      DB_HOST: postgres
    ports:
      - "8012:8012"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  restore-worker:
    build:
      context: .
      dockerfile: workers/restore-worker/Dockerfile
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      RABBITMQ_ENABLED: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY}
      # Multi-app registration
      APP_1_CLIENT_ID: ${APP_1_CLIENT_ID}
      APP_1_CLIENT_SECRET: ${APP_1_CLIENT_SECRET}
      APP_1_TENANT_ID: ${APP_1_TENANT_ID}
      APP_2_CLIENT_ID: ${APP_2_CLIENT_ID:-}
      APP_2_CLIENT_SECRET: ${APP_2_CLIENT_SECRET:-}
      APP_2_TENANT_ID: ${APP_2_TENANT_ID:-}
      APP_3_CLIENT_ID: ${APP_3_CLIENT_ID:-}
      APP_3_CLIENT_SECRET: ${APP_3_CLIENT_SECRET:-}
      APP_3_TENANT_ID: ${APP_3_TENANT_ID:-}
      AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID}
      AZURE_AD_CLIENT_SECRET: ${AZURE_AD_CLIENT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network
    mem_limit: 4g
    deploy:
      replicas: ${RESTORE_WORKER_REPLICAS:-2}
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

  restore-worker-heavy:
    build:
      context: .
      dockerfile: workers/restore-worker/Dockerfile
    container_name: tm_vault_restore_worker_heavy
    env_file: .env
    environment:
      DB_HOST: postgres
      RABBITMQ_ENABLED: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY}
      # Multi-app registration
      APP_1_CLIENT_ID: ${APP_1_CLIENT_ID}
      APP_1_CLIENT_SECRET: ${APP_1_CLIENT_SECRET}
      APP_1_TENANT_ID: ${APP_1_TENANT_ID}
      APP_2_CLIENT_ID: ${APP_2_CLIENT_ID:-}
      APP_2_CLIENT_SECRET: ${APP_2_CLIENT_SECRET:-}
      APP_2_TENANT_ID: ${APP_2_TENANT_ID:-}
      APP_3_CLIENT_ID: ${APP_3_CLIENT_ID:-}
      APP_3_CLIENT_SECRET: ${APP_3_CLIENT_SECRET:-}
      APP_3_TENANT_ID: ${APP_3_TENANT_ID:-}
      AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID}
      AZURE_AD_CLIENT_SECRET: ${AZURE_AD_CLIENT_SECRET}
      RESTORE_WORKER_QUEUE: restore.heavy
      MAX_CONCURRENT_EXPORTS_PER_WORKER: 1
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 16G
        reservations:
          memory: 4G
    mem_limit: 16g
    restart: unless-stopped
    networks:
      - tm-network

  # search-service removed — see note above graph-proxy/delta-token. Gateway
  # routes /resources/search to resource-service; this service had no callers.

  # ===== Azure Workload Worker (AZ-1/2/3) =====

  azure-workload-worker:
    build:
      context: .
      dockerfile: workers/azure-workload-worker/Dockerfile
    container_name: tm_vault_azure_workload
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      RABBITMQ_ENABLED: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY}
      # Azure ARM credentials for VM/SQL/PostgreSQL backup
      AZURE_ARM_CLIENT_ID: ${AZURE_ARM_CLIENT_ID:-}
      AZURE_ARM_CLIENT_SECRET: ${AZURE_ARM_CLIENT_SECRET:-}
      AZURE_ARM_TENANT_ID: ${AZURE_ARM_TENANT_ID:-}
      # Fallback to Graph app credentials if ARM-specific not set
      APP_1_CLIENT_ID: ${APP_1_CLIENT_ID}
      APP_1_CLIENT_SECRET: ${APP_1_CLIENT_SECRET}
      APP_1_TENANT_ID: ${APP_1_TENANT_ID}
      # Backup resource group
      AZURE_BACKUP_RESOURCE_GROUP: ${AZURE_BACKUP_RESOURCE_GROUP:-tmvault-backup}
      AZURE_BACKUP_REGION: ${AZURE_BACKUP_REGION:-eastus}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network
    deploy:
      replicas: ${AZURE_WORKER_REPLICAS:-1}

  # ===== DR Replication Worker (AZ-4) =====

  dr-replication-worker:
    build:
      context: .
      dockerfile: services/dr-replication-worker/Dockerfile
    container_name: tm_vault_dr_replication
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network
    deploy:
      replicas: ${DR_WORKER_REPLICAS:-1}

volumes:
  postgres_data:
  redis_data:
  azurite_data:
  seaweedfs_data:

networks:
  tm-network:
    driver: bridge
