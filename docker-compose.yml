services:
  postgres:
    image: postgres:16-alpine
    container_name: tm_vault_db
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - tm-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: tm_vault_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    # Config mounted from host - if mount fails, comment out and use defaults:
    # volumes:
    #   - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tm-network

  redis:
    image: redis:7-alpine
    container_name: tm_vault_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - tm-network

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: tm_vault_gateway
    env_file: .env
    environment:
      DB_HOST: postgres
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    ports:
      - "8080:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: tm_vault_auth
    env_file: .env
    environment:
      DB_HOST: postgres
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  tenant-service:
    build:
      context: .
      dockerfile: services/tenant-service/Dockerfile
    container_name: tm_vault_tenant
    env_file: .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  resource-service:
    build:
      context: .
      dockerfile: services/resource-service/Dockerfile
    container_name: tm_vault_resource
    env_file: .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  job-service:
    build:
      context: .
      dockerfile: services/job-service/Dockerfile
    container_name: tm_vault_job
    env_file: .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  snapshot-service:
    build:
      context: .
      dockerfile: services/snapshot-service/Dockerfile
    container_name: tm_vault_snapshot
    env_file: .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  dashboard-service:
    build:
      context: .
      dockerfile: services/dashboard-service/Dockerfile
    container_name: tm_vault_dashboard
    env_file: .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  alert-service:
    build:
      context: .
      dockerfile: services/alert-service/Dockerfile
    container_name: tm_vault_alert
    env_file: .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  discovery-worker:
    build:
      context: .
      dockerfile: workers/discovery-worker/Dockerfile
    container_name: tm_vault_discovery
    env_file: .env
    environment:
      DB_HOST: postgres
      RABBITMQ_ENABLED: ${RABBITMQ_ENABLED:-false}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  # ===== Mass Backup Services =====
  
  backup-scheduler:
    build:
      context: .
      dockerfile: services/backup-scheduler/Dockerfile
    container_name: tm_vault_backup_scheduler
    env_file: .env
    environment:
      DB_HOST: postgres
      RABBITMQ_ENABLED: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8008:8008"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  backup-worker:
    build:
      context: .
      dockerfile: workers/backup-worker/Dockerfile
    env_file: .env
    environment:
      DB_HOST: postgres
      RABBITMQ_ENABLED: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY}
      # Multi-app registration
      APP_1_CLIENT_ID: ${APP_1_CLIENT_ID}
      APP_1_CLIENT_SECRET: ${APP_1_CLIENT_SECRET}
      APP_1_TENANT_ID: ${APP_1_TENANT_ID}
      APP_2_CLIENT_ID: ${APP_2_CLIENT_ID:-}
      APP_2_CLIENT_SECRET: ${APP_2_CLIENT_SECRET:-}
      APP_2_TENANT_ID: ${APP_2_TENANT_ID:-}
      APP_3_CLIENT_ID: ${APP_3_CLIENT_ID:-}
      APP_3_CLIENT_SECRET: ${APP_3_CLIENT_SECRET:-}
      APP_3_TENANT_ID: ${APP_3_TENANT_ID:-}
      AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID}
      AZURE_AD_CLIENT_SECRET: ${AZURE_AD_CLIENT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network
    deploy:
      replicas: ${BACKUP_WORKER_REPLICAS:-3}

  graph-proxy:
    build:
      context: .
      dockerfile: services/graph-proxy/Dockerfile
    container_name: tm_vault_graph_proxy
    env_file: .env
    environment:
      AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID}
      AZURE_AD_CLIENT_SECRET: ${AZURE_AD_CLIENT_SECRET}
      AZURE_AD_TENANT_ID: ${AZURE_AD_TENANT_ID}
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8009:8009"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  delta-token:
    build:
      context: .
      dockerfile: services/delta-token/Dockerfile
    container_name: tm_vault_delta_token
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8010:8010"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  progress-tracker:
    build:
      context: .
      dockerfile: services/progress-tracker/Dockerfile
    container_name: tm_vault_progress_tracker
    env_file: .env
    environment:
      DB_HOST: postgres
      RABBITMQ_ENABLED: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "8011:8011"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  audit-service:
    build:
      context: .
      dockerfile: services/audit-service/Dockerfile
    container_name: tm_vault_audit
    env_file: .env
    environment:
      DB_HOST: postgres
    ports:
      - "8012:8012"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  restore-worker:
    build:
      context: .
      dockerfile: workers/restore-worker/Dockerfile
    env_file: .env
    environment:
      DB_HOST: postgres
      RABBITMQ_ENABLED: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY}
      # Multi-app registration
      APP_1_CLIENT_ID: ${APP_1_CLIENT_ID}
      APP_1_CLIENT_SECRET: ${APP_1_CLIENT_SECRET}
      APP_1_TENANT_ID: ${APP_1_TENANT_ID}
      APP_2_CLIENT_ID: ${APP_2_CLIENT_ID:-}
      APP_2_CLIENT_SECRET: ${APP_2_CLIENT_SECRET:-}
      APP_2_TENANT_ID: ${APP_2_TENANT_ID:-}
      APP_3_CLIENT_ID: ${APP_3_CLIENT_ID:-}
      APP_3_CLIENT_SECRET: ${APP_3_CLIENT_SECRET:-}
      APP_3_TENANT_ID: ${APP_3_TENANT_ID:-}
      AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID}
      AZURE_AD_CLIENT_SECRET: ${AZURE_AD_CLIENT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network
    deploy:
      replicas: ${RESTORE_WORKER_REPLICAS:-2}

  search-service:
    build:
      context: .
      dockerfile: services/search-service/Dockerfile
    container_name: tm_vault_search
    env_file: .env
    environment:
      DB_HOST: postgres
    ports:
      - "8013:8013"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

volumes:
  postgres_data:
  redis_data:

networks:
  tm-network:
    driver: bridge
