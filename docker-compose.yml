version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tm_vault_db
    environment:
      POSTGRES_DB: tm_vault_db
      POSTGRES_USER: tm_vault_admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tm_vault_admin"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - tm-network

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: tm_vault_gateway
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: tm_vault_db
      DB_USERNAME: tm_vault_admin
      DB_PASSWORD: admin123
      JWT_SECRET: tm-vault-secret-key-change-in-production
      CORS_ORIGINS: '["http://localhost:4200","http://localhost:3000","http://localhost:5173"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: tm_vault_auth
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: tm_vault_db
      DB_USERNAME: tm_vault_admin
      DB_PASSWORD: admin123
      JWT_SECRET: tm-vault-secret-key-change-in-production
      MICROSOFT_CLIENT_ID: placeholder
      MICROSOFT_CLIENT_SECRET: placeholder
      MICROSOFT_TENANT_ID: common
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  tenant-service:
    build:
      context: .
      dockerfile: services/tenant-service/Dockerfile
    container_name: tm_vault_tenant
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: tm_vault_db
      DB_USERNAME: tm_vault_admin
      DB_PASSWORD: admin123
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  resource-service:
    build:
      context: .
      dockerfile: services/resource-service/Dockerfile
    container_name: tm_vault_resource
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: tm_vault_db
      DB_USERNAME: tm_vault_admin
      DB_PASSWORD: admin123
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  job-service:
    build:
      context: .
      dockerfile: services/job-service/Dockerfile
    container_name: tm_vault_job
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: tm_vault_db
      DB_USERNAME: tm_vault_admin
      DB_PASSWORD: admin123
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  snapshot-service:
    build:
      context: .
      dockerfile: services/snapshot-service/Dockerfile
    container_name: tm_vault_snapshot
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: tm_vault_db
      DB_USERNAME: tm_vault_admin
      DB_PASSWORD: admin123
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  dashboard-service:
    build:
      context: .
      dockerfile: services/dashboard-service/Dockerfile
    container_name: tm_vault_dashboard
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: tm_vault_db
      DB_USERNAME: tm_vault_admin
      DB_PASSWORD: admin123
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  alert-service:
    build:
      context: .
      dockerfile: services/alert-service/Dockerfile
    container_name: tm_vault_alert
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: tm_vault_db
      DB_USERNAME: tm_vault_admin
      DB_PASSWORD: admin123
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

volumes:
  postgres_data:

networks:
  tm-network:
    driver: bridge
