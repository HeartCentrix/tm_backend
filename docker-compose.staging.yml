# Staging overlay — second Postgres (fake on-prem DC) + storage-toggle-worker.
# Run with: docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d
#
# The second Postgres lets you rehearse the DB-promote phase with the `manual`
# or `patroni` strategy instead of the pilot's `noop`.
#
# SeaweedFS + Azurite come from the main compose under the `test` profile —
# use `--profile test` when bringing this stack up.

services:
  postgres-onprem:
    image: postgres:16-alpine
    container_name: tm_vault_db_onprem
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - pg_onprem_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - tm-network

  storage-toggle-worker:
    build:
      context: .
      dockerfile: services/storage_toggle_worker/Dockerfile
    container_name: tm_vault_toggle_worker
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      PG_PROMOTE_STRATEGY: noop
      DNS_FLIP_STRATEGY: noop
      WORKER_RESTART_STRATEGY: noop
      DB_HOST: postgres
      RABBITMQ_HOST: rabbitmq
      ONPREM_S3_ENDPOINT: http://seaweedfs:8333
      ONPREM_S3_ACCESS_KEY: testaccess
      ONPREM_S3_SECRET_KEY: testsecret
      ONPREM_S3_BUCKETS: tmvault-test-0
      ONPREM_S3_VERIFY_TLS: "false"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

volumes:
  pg_onprem_data:
