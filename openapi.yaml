components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer token for authentication

  schemas:
    # Auth Schemas
    MicrosoftAuthUrlResponse:
      type: object
      properties:
        url:
          type: string
          description: Microsoft/Azure OAuth authorization URL
        state:
          type: string
          description: OAuth state parameter

    OAuthCallbackRequest:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          description: OAuth authorization code
        state:
          type: string
          description: OAuth state parameter

    RefreshTokenRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          description: Refresh token

    RefreshTokenResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          description: Token expiry in seconds

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
        user:
          $ref: '#/components/schemas/UserResponse'

    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        roles:
          type: array
          items:
            type: string
            enum: [SUPER_ADMIN, ORG_ADMIN, TENANT_ADMIN, BACKUP_OPERATOR, RESTORE_OPERATOR, CONTENT_VIEWER, USER]
        organizationId:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid

    DatasourceCallbackResponse:
      type: object
      properties:
        tenantId:
          type: string
        tenantName:
          type: string

    # Tenant Schemas
    TenantCreateRequest:
      type: object
      required:
        - name
        - organizationId
        - microsoftTenantId
      properties:
        name:
          type: string
        organizationId:
          type: string
          format: uuid
        microsoftTenantId:
          type: string
        connectionDetails:
          type: object

    TenantResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orgId:
          type: string
          format: uuid
        type:
          type: string
          enum: [M365, AZURE, BOTH]
        displayName:
          type: string
        externalTenantId:
          type: string
        subscriptionId:
          type: string
        clientId:
          type: string
        status:
          type: string
        storageRegion:
          type: string
        lastDiscoveryAt:
          type: string
          format: date-time

    DiscoveryResponse:
      type: object
      properties:
        discoveryId:
          type: string
        resourcesFound:
          type: integer

    DiscoveryStatus:
      type: object
      properties:
        status:
          type: string
          enum: [PENDING, RUNNING, COMPLETED, FAILED]
        progress:
          type: number
        resourcesFound:
          type: integer

    # Organization Schemas
    OrganizationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        storageRegion:
          type: string
        encryptionMode:
          type: string
        storageQuotaBytes:
          type: integer
        storageBytesUsed:
          type: integer

    # Resource Schemas
    ResourceResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        type:
          type: string
          enum: [MAILBOX, ONEDRIVE, SHAREPOINT, TEAMS, ENTRA_USER, ENTRA_GROUP, SHARED_MAILBOX, ROOM]
        externalId:
          type: string
        displayName:
          type: string
        email:
          type: string
        metadata:
          type: object
        slaPolicyId:
          type: string
          format: uuid
        status:
          type: string
        storageBytes:
          type: integer
        lastBackupAt:
