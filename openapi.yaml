openapi: 3.0.3
info:
  title: Tenant Management & Backup System API
  description: |
    Comprehensive API for managing Microsoft 365 and Azure tenant backups, including authentication, 
    resource management, backup/restore operations, snapshot management, monitoring, alerts, and audit logging.
    
    ## Architecture
    This API consists of 13 microservices behind an API Gateway:
    - **Auth Service** - Authentication and authorization
    - **Tenant Service** - Tenant and organization management
    - **Resource Service** - Resource and SLA policy management
    - **Job Service** - Backup, restore, and export jobs
    - **Snapshot Service** - Snapshot management
    - **Dashboard Service** - Analytics and overview
    - **Alert Service** - Alert and access group management
    - **Backup Scheduler** - Automated backup scheduling
    - **Delta Token Service** - Incremental backup tracking
    - **Progress Tracker** - Real-time progress monitoring
    - **Audit Service** - Audit logging and activity tracking
    - **Search Service** - Search and discovery
    
    ## Authentication
    Most endpoints require JWT Bearer token authentication. Include the token in the Authorization header:
    ```
    Authorization: Bearer <your-jwt-token>
    ```
    
    ## Rate Limiting
    Rate limiting may be configured at the API Gateway level.
  version: 1.0.0
  contact:
    name: API Support
  license:
    name: Proprietary

servers:
  - url: http://localhost:8000
    description: API Gateway (Development)
  - url: http://localhost:8001
    description: Auth Service (Development)
  - url: http://localhost:8002
    description: Tenant Service (Development)
  - url: http://localhost:8003
    description: Resource Service (Development)
  - url: http://localhost:8004
    description: Job Service (Development)
  - url: http://localhost:8005
    description: Snapshot Service (Development)
  - url: http://localhost:8006
    description: Dashboard Service (Development)
  - url: http://localhost:8007
    description: Alert Service (Development)
  - url: http://localhost:8008
    description: Backup Scheduler (Development)
  - url: http://localhost:8010
    description: Delta Token Service (Development)
  - url: http://localhost:8011
    description: Progress Tracker (Development)
  - url: http://localhost:8012
    description: Audit Service (Development)
  - url: http://localhost:8013
    description: Search Service (Development)

tags:
  - name: Authentication
    description: User authentication, token management, and Microsoft/ Azure OAuth flows
  - name: Tenants
    description: Manage Microsoft 365 and Azure tenants
  - name: Organizations
    description: Manage organizations
  - name: Resources
    description: Manage backup resources (mailboxes, OneDrive, SharePoint, Teams, Entra ID)
  - name: Policies
    description: Manage SLA backup policies
  - name: Jobs
    description: Manage backup, restore, and export jobs
  - name: Backups
    description: Trigger and manage backup operations
  - name: Restores
    description: Manage restore operations
  - name: Snapshots
    description: Manage backup snapshots and snapshot items
  - name: Dashboard
    description: Dashboard analytics and overview
  - name: Alerts
    description: Manage alerts and notifications
  - name: Access Groups
    description: Manage access groups and permissions
  - name: Scheduler
    description: Manage backup scheduling
  - name: Delta Tokens
    description: Manage delta tokens for incremental backups
  - name: Progress
    description: Track backup job progress
  - name: Audit
    description: Audit logging and event tracking
  - name: Activity
    description: Activity log and export
  - name: Search
    description: Search and discovery across all resources
  - name: DLQ
    description: Dead Letter Queue management
  - name: Health
    description: Health check endpoints

paths:
  # ==================== AUTH SERVICE ====================
  /api/v1/auth/microsoft/url:
    get:
      tags:
        - Authentication
      summary: Get Microsoft OAuth URL
      description: Returns the Microsoft OAuth authorization URL for initial authentication
      operationId: getMicrosoftAuthUrl
      parameters:
        - name: redirect_uri
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Microsoft authorization URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MicrosoftAuthUrlResponse'

  /api/v1/auth/microsoft/datasource/url:
    get:
      tags:
        - Authentication
      summary: Get Microsoft datasource OAuth URL
      description: Returns the Microsoft OAuth URL for datasource connection
      operationId: getMicrosoftDatasourceAuthUrl
      responses:
        '200':
          description: Microsoft authorization URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MicrosoftAuthUrlResponse'

  /api/v1/auth/azure/datasource/url:
    get:
      tags:
        - Authentication
      summary: Get Azure datasource OAuth URL
      description: Returns the Azure OAuth URL for datasource connection
      operationId: getAzureDatasourceAuthUrl
      responses:
        '200':
          description: Azure authorization URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MicrosoftAuthUrlResponse'

  /api/v1/auth/callback:
    post:
      tags:
        - Authentication
      summary: Handle OAuth callback
      description: Processes the OAuth callback from Microsoft/Azure
      operationId: handleAuthCallback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthCallbackRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'

  /api/v1/auth/microsoft/datasource/callback:
    post:
      tags:
        - Authentication
      summary: Handle Microsoft datasource callback
      description: Processes the Microsoft datasource OAuth callback
      operationId: handleMicrosoftDatasourceCallback
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthCallbackRequest'
      responses:
        '200':
          description: Datasource connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasourceCallbackResponse'

  /api/v1/auth/azure/datasource/callback:
    post:
      tags:
        - Authentication
      summary: Handle Azure datasource callback
      description: Processes the Azure datasource OAuth callback
      operationId: handleAzureDatasourceCallback
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthCallbackRequest'
      responses:
        '200':
          description: Datasource connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasourceCallbackResponse'

  /api/v1/auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      description: Refreshes an expired access token using the refresh token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'

  /api/v1/auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout user
      description: Logs out the current user and invalidates tokens
      operationId: logout
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /api/v1/auth/me:
    get:
      tags:
        - Authentication
      summary: Get current user info
      description: Returns information about the currently authenticated user
      operationId: getCurrentUser
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  # ==================== TENANT SERVICE ====================
  /api/v1/tenants:
    get:
      tags:
        - Tenants
      summary: List all tenants
      description: Returns a list of all tenants
      operationId: listTenants
      responses:
        '200':
          description: List of tenants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TenantResponse'
    post:
      tags:
        - Tenants
      summary: Create tenant
      description: Creates a new tenant
      operationId: createTenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantCreateRequest'
      responses:
        '201':
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantResponse'

  /api/v1/tenants/{tenant_id}:
    get:
      tags:
        - Tenants
      summary: Get tenant by ID
      description: Returns a specific tenant by ID
      operationId: getTenant
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Tenant details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantResponse'
    put:
      tags:
        - Tenants
      summary: Update tenant
      description: Updates an existing tenant
      operationId: updateTenant
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantCreateRequest'
      responses:
        '200':
          description: Tenant updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantResponse'
    delete:
      tags:
        - Tenants
      summary: Delete tenant
      description: Deletes a tenant
      operationId: deleteTenant
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Tenant deleted

  /api/v1/tenants/{tenant_id}/discover:
    post:
      tags:
        - Tenants
      summary: Discover tenant resources
      description: Initiates resource discovery for a tenant
      operationId: discoverTenantResources
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Discovery initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoveryResponse'

  /api/v1/tenants/{tenant_id}/discover-m365:
    post:
      tags:
        - Tenants
      summary: Discover M365 resources
      description: Initiates M365 resource discovery for a tenant
      operationId: discoverM365Resources
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Discovery initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoveryResponse'

  /api/v1/tenants/{tenant_id}/discover-azure:
    post:
      tags:
        - Tenants
      summary: Discover Azure resources
      description: Initiates Azure resource discovery for a tenant
      operationId: discoverAzureResources
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Discovery initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoveryResponse'

  /api/v1/tenants/{tenant_id}/discovery-status:
    get:
      tags:
        - Tenants
      summary: Get discovery status
      description: Returns the status of tenant resource discovery
      operationId: getDiscoveryStatus
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Discovery status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoveryStatus'

  /api/v1/tenants/{tenant_id}/storage-summary:
    get:
      tags:
        - Tenants
      summary: Get storage summary
      description: Returns storage usage summary for a tenant
      operationId: getStorageSummary
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Storage summary
          content:
            application/json:
              type: array
              items:
                type: object

  /api/v1/tenants/{tenant_id}/test-connection:
    post:
      tags:
        - Tenants
      summary: Test tenant connection
      description: Tests the connection to a tenant
      operationId: testConnection
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Connection test result
          content:
            application/json:
              schema:
                type: object
                properties:
                  connected:
                    type: boolean
                  message:
                    type: string

  # ==================== ORGANIZATION SERVICE ====================
  /api/v1/organizations:
    get:
      tags:
        - Organizations
      summary: List all organizations
      description: Returns a list of all organizations
      operationId: listOrganizations
      responses:
        '200':
          description: List of organizations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrganizationResponse'

  /api/v1/organizations/{org_id}:
    get:
      tags:
        - Organizations
      summary: Get organization by ID
      description: Returns a specific organization by ID
      operationId: getOrganization
      parameters:
        - name: org_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Organization details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'

  # ==================== RESOURCE SERVICE ====================
  /api/v1/resources:
    get:
      tags:
        - Resources
      summary: List resources
      description: Returns a paginated list of resources with optional filtering
      operationId: listResources
      parameters:
        - name: tenantId
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Paginated resource list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceListResponse'

  /api/v1/resources/search:
    get:
      tags:
        - Resources
      summary: Search resources
      description: Searches resources by query and type
      operationId: searchResources
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ResourceResponse'

  /api/v1/resources/by-type:
    get:
      tags:
        - Resources
      summary: Get resources by type
      description: Returns resources filtered by type
      operationId: getResourcesByType
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
        - name: tenantId
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated resource list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceListResponse'

  /api/v1/resources/users:
    get:
      tags:
        - Resources
      summary: Get user resources
      description: Returns user-type resources (mailboxes, OneDrive)
      operationId: getUserResources
      parameters:
        - name: tenantId
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: List of user resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResourceResponse'

  /api/v1/resources/{resource_id}:
    get:
      tags:
        - Resources
      summary: Get resource by ID
      description: Returns a specific resource
      operationId: getResource
      parameters:
        - name: resource_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Resource details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceResponse'
    delete:
      tags:
        - Resources
      summary: Delete resource
      description: Deletes a resource
      operationId: deleteResource
      parameters:
        - name: resource_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Resource deleted

  /api/v1/resources/{resource_id}/storage-history:
    get:
      tags:
        - Resources
      summary: Get storage history
      description: Returns 30-day storage size history for a resource
      operationId: getStorageHistory
      parameters:
        - name: resource_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Storage history
          content:
            application/json:
              type: array
              items:
                type: object
                properties:
                  date:
                    type: string
                    format: date
                  size:
                    type: integer

  /api/v1/resources/{resource_id}/assign-policy:
    post:
      tags:
        - Resources
      summary: Assign SLA policy to resource
      description: Assigns an SLA policy to a resource
      operationId: assignPolicy
      parameters:
        - name: resource_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignPolicyRequest'
      responses:
        '204':
          description: Policy assigned

  /api/v1/resources/{resource_id}/unassign-policy:
    post:
      tags:
        - Resources
      summary: Unassign SLA policy from resource
      description: Removes SLA policy assignment from a resource
      operationId: unassignPolicy
      parameters:
        - name: resource_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Policy unassigned

  /api/v1/resources/{resource_id}/archive:
    post:
      tags:
        - Resources
      summary: Archive resource
      description: Archives a resource
      operationId: archiveResource
      parameters:
        - name: resource_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Resource archived

  /api/v1/resources/{resource_id}/unarchive:
    post:
      tags:
        - Resources
      summary: Unarchive resource
      description: Unarchives a resource
      operationId: unarchiveResource
      parameters:
        - name: resource_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Resource unarchived

  /api/v1/resources/bulk-assign-policy:
    post:
      tags:
        - Resources
      summary: Bulk assign policy
      description: Assigns SLA policy to multiple resources
      operationId: bulkAssignPolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkAssignRequest'
      responses:
        '200':
          description: Bulk assignment result
          content:
            application/json:
              schema:
                type: object
                properties:
                  assigned:
                    type: integer
                  not_found:
                    type: integer

  /api/v1/resources/bulk-unassign-policy:
    post:
      tags:
        - Resources
      summary: Bulk unassign policy
      description: Removes SLA policy from multiple resources
      operationId: bulkUnassignPolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkUnassignRequest'
      responses:
        '200':
          description: Bulk unassignment result
          content:
            application/json:
              schema:
                type: object
                properties:
                  unassigned:
                    type: integer
                  not_found:
                    type: integer

  # ==================== POLICY SERVICE ====================
  /api/v1/policies:
    get:
      tags:
        - Policies
      summary: List SLA policies
      description: Returns all SLA policies
      operationId: listPolicies
      responses:
        '200':
          description: List of SLA policies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SlaPolicyResponse'
    post:
      tags:
        - Policies
      summary: Create SLA policy
      description: Creates a new SLA backup policy
      operationId: createPolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SlaPolicyCreateRequest'
      responses:
        '201':
          description: Policy created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlaPolicyResponse'

  /api/v1/policies/{policy_id}:
    get:
      tags:
        - Policies
      summary: Get SLA policy by ID
      description: Returns a specific SLA policy
      operationId: getPolicy
      parameters:
        - name: policy_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Policy details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlaPolicyResponse'
    put:
      tags:
        - Policies
      summary: Update SLA policy
      description: Updates an existing SLA policy
      operationId: updatePolicy
      parameters:
        - name: policy_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SlaPolicyCreateRequest'
      responses:
        '200':
          description: Policy updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlaPolicyResponse'
    delete:
      tags:
        - Policies
      summary: Delete SLA policy
      description: Deletes an SLA policy
      operationId: deletePolicy
      parameters:
        - name: policy_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Policy deleted

  /api/v1/policies/{policy_id}/resources:
    get:
      tags:
        - Policies
      summary: Get policy resources
      description: Returns resources assigned to a policy
      operationId: getPolicyResources
      parameters:
        - name: policy_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Resources list
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: '#/components/schemas/ResourceResponse'
                  totalPages:
                    type: integer
                  totalElements:
                    type: integer

  /api/v1/policies/{policy_id}/auto-assign:
    post:
      tags:
        - Policies
      summary: Auto-assign policy
      description: Automatically assigns policy to matching resources
      operationId: autoAssignPolicy
      parameters:
        - name: policy_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Policy auto-assigned

  # ==================== JOB SERVICE ====================
  /api/v1/jobs:
    get:
      tags:
        - Jobs
      summary: List jobs
      description: Returns paginated list of jobs with filtering
      operationId: listJobs
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: tenantId
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [PENDING, RUNNING, COMPLETED, FAILED, CANCELLED]
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [BACKUP, RESTORE, EXPORT, DISCOVERY, DELETE]
      responses:
        '200':
          description: Job list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobListResponse'

  /api/v1/jobs/{job_id}:
    get:
      tags:
        - Jobs
      summary: Get job by ID
      description: Returns job details
      operationId: getJob
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
