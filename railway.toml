[build]
  builder = "dockerfile"

# ─────────────────────────────────────────────
# API GATEWAY
# ─────────────────────────────────────────────
[[services]]
  name = "api-gateway"
  dockerfilePath = "api-gateway/Dockerfile"
  buildContext = "."

  [services.deploy]
    startCommand = ""
    healthcheckPath = "/health"
    restartPolicyType = "on_failure"

  [[services.variables]]
    name = "DB_HOST"
    value = "${{Postgres.PGHOST}}"

  [[services.variables]]
    name = "DB_PORT"
    value = "${{Postgres.PGPORT}}"

  [[services.variables]]
    name = "DB_NAME"
    value = "${{Postgres.PGDATABASE}}"

  [[services.variables]]
    name = "DB_USERNAME"
    value = "${{Postgres.PGUSER}}"

  [[services.variables]]
    name = "DB_PASSWORD"
    value = "${{Postgres.PGPASSWORD}}"

  [[services.variables]]
    name = "JWT_SECRET"
    value = "${{shared.JWT_SECRET}}"

  [[services.variables]]
    name = "CORS_ORIGINS"
    value = "${{shared.CORS_ALLOWED_ORIGINS}}"

